            \ - 76 : La Banque de la Réunion pour toutes les sommes qui lui sont dues.\
            \ Le  solde éventuel est versé, en cas de vie à l'assuré(e), et, en cas\
            \ de décès,  au conjoint de l'assuré(e) non séparé de corps; à défaut\
            \ aux descendants de   l'assuré(e), nés ou à naitre, vivants ou repré\
            sentés; à défaut aux héritiers  de l'assuré(e). \n - 77 : Le Crédit Lyonnais\
            \ pour toutes les sommes qui lui sont dues. Le solde  éventuel est versé\
            \ aux enfants de l'assuré(e), nés ou à naître, vivants ou représentés\
            \ ; à défaut aux héritiers de l'assuré(e). \n - 78 : La Banque de la Ré\
            union pour toutes les sommes qui lui sont dues. Le  solde éventuel est\
