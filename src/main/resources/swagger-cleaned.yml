            , non séparé de corps, ou le partenaire lié à l'assuré par un pacte civil\
            \ de solidarité ; à défaut les enfants de l'assuré, nés ou à naître, vivants\
            \ ou représentés ; à défaut les héritiers de l'assuré. \n - 97 : Les enfants\
            \ de l'assuré, nés ou à naître, vivants ou représentés, à défaut les hé\
            ritiers de l'assuré. \n - 98 : Les enfants de l'assuré, nés ou à naître,\
            \ vivants ou représentés, à défaut Le conjoint de l'assuré, non séparé\
            \ de corps, ou le partenaire lié à l'assuré par un pacte civil de solidarité\
            , à défaut les héritiers de l'assuré.  \n - 94 : Les enfants de l'adhé\
            rent-assuré, nés ou à naitre, vivants ou représentés; à défaut le conjoint\
            \ de l'adhérent-assuré, non séparé de corps, ou le partenaire lié à l'adhé\
            rent-assuré par un pacte civil de solidarité, à défaut les héritiers de\
            \ l'adhérent-assuré. \n - 95 : Les enfants de l'adhérent-assuré, nés ou\
            \ à naitre, vivants ou représentés; à défaut les héritiers de l'adhérent-assuré\
            . \n - 96 : L'entreprise des pompes funèbres ou la personne qui a réglé\
            \ les obsèques à hauteur de la facture, pour le surplus.  \n - 89 : Le\
            \ conjoint de l'adhérent-assuré, non séparé de corps, ou le partenaire\
            \ lié à l'adhérent-assuré par un pacte civil de solidarité, à défaut les\
            \ enfants de l'adhérents-assuré, nés ou à naitre, vivants ou représenté\
            s, à défaut les héritiers de l'adhérent-assuré. Lors de la réalisation\
            \ du risque, si le bénéficiaire est un enfants de moins de 25 ans, la\
            \ prestation sera versée sous forme d'une rente éducation. \n - 91 : L'entreprise\
            \ des pompes funèbres ou la personne qui a réglé mes obsèques à hauteur\
            \ de la facture, pour le surplus mon conjoint, à défaut mes héritiers.\n\
            \ - 12 : Les enfants du souscripteur, nés ou à naître, vivants ou repré\
            sentés à défaut les héritiers du souscripteur (clause créée uniquement\
