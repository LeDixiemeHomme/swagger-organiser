          format: "double"
          description: "Montant  à arbitrer (en €) \n à renseigner si code ='IP'"
          example: 50
        rate:
          type: "number"
          format: "double"
          description: "Pourcentage à arbitrer \n à renseigner si code = 'SL', 'SR',\
            \ 'SW', 'RE' ou 'SP'"
          example: 0.2
        order_number:
          type: "integer"
          description: "numéro d'ordre. Permet d'indiquer à quel support de prélè\
            vement correspond chaque support de destination \n à renseigner si code\
            \ = 'SR', 'SW' ou 'SL'"
          format: "int32"
          example: 1
        isin_code:
          type: "string"
          description: "Code Isin du support"
          example: "FR001400BL08"
        nature_code:
          type: "string"
          description: "Code nature du support : \n - EE : European equity (Actions\
            \ européennes) \n - FE : French equity (Actions françaises) \n - IE :\
            \ International equity (Actions internationales) \n - DI : Diversifié\
            \ \n - FF : Fonds à formule \n - ME : Monetary euro (Monétaire euro) \n\
            \ - EU : Euro (Numéraire) \n - IB : International bonds (Obligations internationales)\
            \ \n - EB : Europeen bonds (Obligations européennes) \n - UO : UC Obligataire\
            \ \n - EC : Eurocroissance \n - IS : SCPI \n - IO : OPCI \n - IC : SCI\
            \ \n - TC : Titre de créance \n- SF : SAF Monétarisé \n - OE : Action\
            \ Euro \n - PR : Point Retraite \n - ET : Exchange-Traded Funds"
          example: "IS"
