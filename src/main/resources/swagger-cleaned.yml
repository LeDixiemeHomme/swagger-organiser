            \ de corps, à défaut les enfants de l'assuré(e), nés ou à naître, vivants\
            \ ou représentés, à défaut  les héritiers de l'assuré(e). Lors de la ré\
            alisation du risque, si le bénéficiaire est un enfant de moins de 25 ans,\
            \ la prestation sera versée sous forme d'une rente éducation. \n - 84\
            \ : Les enfants de l'assuré(e), nés ou à naître, vivants ou représenté\
            s,  à défaut les héritiers de l'assuré(e). Lors de la réalisation du risque,\
            \ si le bénéficiaire est un enfant de moins de 25 ans, la prestation sera\
