---
openapi: "3.0.1"
info:
  title: "Subscription API"
  description: "Swagger for subscription API Internet/Intranet : API de l'acte d'adhé\
    sion épargne retraite individuelle"
  termsOfService: "termsOfServiceUrl"
  contact:
    name: "contact"
  license:
    name: "license"
  version: "version 1"
servers:
  - url: "/"
tags:
  - name: "Acte d'adhésion"
paths:
  /cadh/v1/operations/{operation_id}/documents:
    get:
      tags:
        - "Acte d'adhésion"
      summary: "Retourne la liste des documents à signer"
      description: "Retourner la liste des documents (contractuels &agrave; signer\
        \ et pr&eacute;contractuels à pr&eacute;senter) <br> associ&eacute;e &agrave;\
        \ une adh&eacute;sion. <br> Temps de r&eacute;ponse maximal 0,400s."
      operationId: "getDocuments"
      parameters:
        - name: "operation_id"
          in: "path"
          description: "UUID de l'opération"
          required: true
          schema:
            type: "string"
          example: "6b6dce06-b3a5-4fc5-a58d-c21a207cd75e"
        - name: "signature_date"
          in: "query"
          description: "Date de signature"
          required: false
          schema:
            type: "string"
          example: "2023-04-14T07:58:30.996+0200"
        - name: "generate"
          in: "query"
          description: "Flag de génération des documents"
          required: false
          schema:
            type: "boolean"
            default: false
          example: false
        - name: "Authorization"
          in: "header"
          description: "Le token pour authentifier le service appelant"
          required: true
          schema:
            type: "string"
            example: "Bearer JWT Token"
        - name: "X-Passport"
          in: "header"
          description: "Le token utilisé pour propager l'identité de l'utilisateur"
          required: true
          schema:
            type: "string"
          example: "<JWT Token>"
        - name: "Correlationid"
          in: "header"
          description: "L’identifiant de corrélation permet d’assurer la traçabilité\
          \ des actions initiées par l’application consommatrice."
          required: true
          schema:
            type: "string"
            example: "f77270a9-b280-43e2-96e1-66c290d702b1"
      responses:
        "200":
          description: "Les documents à signer et présenter"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/DocumentDTOV1"
        "400":
          description: "Un ou plusieurs param&egrave;tres d'entr&eacute;e sont incorrects\
            \ ou une erreur fonctionnelle est survenue"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-400-000:
                  description: "E-400-000"
                  value:
                    - code: "E-400-000"
                      message: "Un ou plusieurs paramètres d'entrée sont incorrects\
                      \ ou une erreur fonctionnelle est survenue"
                E-400-007:
                  description: "E-400-002"
                  value:
                    - code: "E-400-002"
                      message: "Autre message 400"
        "401":
          description: "Acc&egrave;s refus&eacute;"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-401-000:
                  description: "E-401-000"
                  value:
                    code: "E-401-000"
                    message: "Accès refusé"
        "403":
          description: "Accès interdit"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-403-000:
                  description: "E-403-000"
                  value:
                    code: "E-403-000"
                    message: "Accès interdit, la fonctionnalité adhésion est désactivé\
                      e"
        "500":
          description: "Erreur serveur interne"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-500:
                  description: "E-500"
                  value:
                    code: "E-500"
                    message: "Erreur serveur interne"
      security:
        - bearerAuth: [ ]
  /cadh/v1/operations/{operation_id}/default_account:
    get:
      tags:
        - "Récupération du numéro de compte bancaire"
      summary: "Service de récupération du numéro de compte bancaire"
      description: "Compte bancaire rattach&eacute; au versement initial lors de l'adh&eacute;sion\
        \ <br> Temps de r&eacute;ponse maximal 0,400s."
      operationId: "getDefaultAccount"
      parameters:
        - name: "Authorization"
          in: "header"
          description: "Le token pour authentifier le service appelant"
          required: true
          schema:
            type: "string"
            default: "Bearer JWT Token"
        - name: "X-Passport"
          in: "header"
          description: "Le token utilisé pour propager l'identité de l'utilisateur"
          required: true
          schema:
            type: "string"
            default: "<JWT Token>"
        - name: "Correlationid"
          in: "header"
          description: "L’identifiant de corrélation permet d’assurer la traçabilité\
          \ des actions initiées par l’application consommatrice."
          required: true
          schema:
            type: "string"
            default: "f77270a9-b280-43e2-96e1-66c290d702b1"
        - name: "operation_id"
          in: "path"
          description: "L’uuid de l'opération d'adhésion épargne"
          required: true
          schema:
            type: "string"
            default: "f6c290d70-b280-43e2-96e1-66c290d02b1"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultAccountOutputDTOV1"
              examples:
                "200":
                  description: "Compte bancaire de réference (lié au VI)"
                  value:
                    iban: "FR0330002000110000123456T00"
                    number: "0000123456T"
                    bic_code: "CRLYFRPPXXX"
                    owner: "M Jean Dupont"
        "400":
          description: "Un ou plusieurs param&egrave;tres d'entr&eacute;e sont incorrects\
            \ ou une erreur fonctionnelle est survenue"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-400-000:
                  description: "E-400-000"
                  value:
                    - code: "E-400-000"
                      message: "Un ou plusieurs paramètres d'entrée sont incorrects\
                      \ ou une erreur fonctionnelle est survenue"
                E-400-001:
                  description: "E-400-001"
                  value:
                    - code: "E-400-001"
                      message: "Autre message 400"
        "404":
          description: "Aucun numéro de compte ne correspond au numéro d'opération\
            \ saisi"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-404-000:
                  description: "E-404-000"
                  value:
                    code: "E-404-000,"
                    message: "Aucun numéro de compte ne correspond au numéro d'opé\
                      ration saisi"
        "401":
          description: "Acc&egrave;s refus&eacute;"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-401-000:
                  description: "E-401-000"
                  value:
                    code: "E-401-000"
                    message: "Accès refusé"
        "403":
          description: "Accès interdit"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-403-000:
                  description: "E-403-000"
                  value:
                    code: "E-403-000"
                    message: "Accès interdit, la fonctionnalité adhésion est désactivé\
                      e"
        "500":
          description: "Erreur serveur interne"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-500:
                  description: "E-500"
                  value:
                    code: "E-500"
                    message: "Erreur serveur interne"
      security:
        - bearerAuth: [ ]
  /cadh/v1/operations/{operation_id}/validity:
    get:
      tags:
        - "Acte d'adhésion"
      summary: "Renvoi la validité de l'opération"
      description: "Contr&ocirc;ler la validit&eacute; de l'op&eacute;ration d'adh&eacute;sion.\
        \ <br> Temps de r&eacute;ponse maximal 0,400s."
      operationId: "checkValidity"
      parameters:
        - name: "Authorization"
          in: "header"
          description: "Le token pour authentifier le service appelant"
          required: true
          schema:
            type: "string"
            default: "Bearer JWT Token"
        - name: "X-Passport"
          in: "header"
          description: "Le token utilisé pour propager l'identité de l'utilisateur"
          required: true
          schema:
            type: "string"
            default: "<JWT Token>"
        - name: "Correlationid"
          in: "header"
          description: "L’identifiant de corrélation permet d’assurer la traçabilité\
          \ des actions initiées par l’application consommatrice."
          required: true
          schema:
            type: "string"
            default: "f77270a9-b280-43e2-96e1-66c290d702b1"
        - name: "operation_id"
          in: "path"
          description: "L’uuid de l'opération d'adhésion épargne"
          required: true
          schema:
            type: "string"
            default: "f6c290d70-b280-43e2-96e1-66c290d02b1"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckValidityOutputDTOV1"
        "400":
          description: "Un ou plusieurs param&egrave;tres d'entr&eacute;e sont incorrects\
            \ ou une erreur fonctionnelle est survenue"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-400-000:
                  description: "E-400-000"
                  value:
                    - code: "E-400-000"
                      message: "Un ou plusieurs paramètres d'entrée sont incorrects\
                      \ ou une erreur fonctionnelle est survenue"
                E-400-001:
                  description: "E-400-001"
                  value:
                    - code: "E-400-001"
                      message: "Autre message 400"
        "404":
          description: "Aucun numéro de compte ne correspond au numéro d'opération\
            \ saisi"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-404-000:
                  description: "E-404-000"
                  value:
                    code: "E-404-000,"
                    message: "Ressource introuvable"
        "401":
          description: "Acc&egrave;s refus&eacute;"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-401-000:
                  description: "E-401-000"
                  value:
                    code: "E-401-000"
                    message: "Accès refusé"
        "403":
          description: "Accès interdit"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-403-000:
                  description: "E-403-000"
                  value:
                    code: "E-403-000"
                    message: "Accès interdit, la fonctionnalité adhésion est désactivé\
                      e"
        "500":
          description: "Erreur serveur interne"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-500:
                  description: "E-500"
                  value:
                    code: "E-500"
                    message: "Erreur serveur interne"
      security:
        - bearerAuth: [ ]
  /cadh/v1/operations/{operation_id}/enforcement:
    put:
      tags:
        - "Acte d'adhésion"
      summary: "Effectue la mise en vigueur de la proposition."
      description: "Effectue la mise en vigueur de la proposition rattach&eacute;e\
        \ &agrave; l'id op&eacute;ration <br> Temps de r&eacute;ponse maximal 1,500s."
      operationId: "putEnforcement"
      parameters:
        - name: "Authorization"
          in: "header"
          description: "Le token pour authentifier le service appelant"
          required: true
          schema:
            type: "string"
            default: "Bearer JWT Token"
        - name: "X-Passport"
          in: "header"
          description: "Le token utilisé pour propager l'identité de l'utilisateur"
          required: true
          schema:
            type: "string"
            default: "<JWT Token>"
        - name: "Correlationid"
          in: "header"
          description: "L’identifiant de corrélation permet d’assurer la traçabilité\
          \ des actions initiées par l’application consommatrice."
          required: true
          schema:
            type: "string"
            default: "f77270a9-b280-43e2-96e1-66c290d702b1"
        - name: "operation_id"
          in: "path"
          description: "L’uuid de l'opération d'adhésion épargne"
          required: true
          schema:
            type: "string"
            default: "f6c290d70-b280-43e2-96e1-66c290d02b1"
        - name: "technical_communication_code"
          in: "query"
          description: "Norme groupe CAM0258: Moyen et format d'échange utilisé pour\
          \ communiquer avec le client. <br> Cette donnée étant fortement liée au\
          \ \"signature_type\" il est nécessaire de remplir les deux si vous voulez\
          \ la remplir. <br> Si ces données ne sont pas remplis, les valeurs par dé\
          faut sont technical_communication_code: 170 et signature_type: 4 <br> Valeurs\
          \ supportées: <br> &nbsp; 010: Face à face agence (transmission d'informations\
          \ directement entre personnes physiquement présentes sur le même lieu (agence))\
          \ <br> &nbsp; 170: Internet ordinateur individuel (par opposition à l’Internet\
          \ mobile, l’utilisateur accède au réseau depuis un navigateur web installé\
          \ sur un ordinateur individuel non apparenté à un téléphone mobile) <br>\
          \ &nbsp; 180: Internet mobile (accès au réseau depuis un navigateur web\
          \ (protocole Internet) installé sur le téléphone mobile de l’utilisateur)"
          required: false
          schema:
            type: "string"
          example: 170
        - name: "signature_type"
          in: "query"
          description: "Norme groupe CAM0309: Types de signature disponibles. <br> Cette\
          \ donnée étant fortement liée au \"technical_communication_code\" il est\
          \ nécessaire de remplir les deux si vous voulez la remplir. <br> Valeurs\
          \ supportées: <br> &nbsp; 1: Signature manuscrite <br> &nbsp; 4: Signature\
          \ électronique"
          required: false
          schema:
            type: "string"
          example: 4
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnforcementOutputDTOV1"
              example:
                archive_id: "202200690781566"
                function_policy_number: 0
        "400":
          description: "Un ou plusieurs param&egrave;tres d'entr&eacute;e sont incorrects\
            \ ou une erreur fonctionnelle est survenue"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-400-000:
                  description: "E-400-000"
                  value:
                    - code: "E-400-000"
                      message: "Un ou plusieurs paramètres d'entrée sont incorrects\
                      \ ou une erreur fonctionnelle est survenue"
                E-400-001:
                  description: "E-400-001"
                  value:
                    - code: "E-400-001"
                      message: "Autre message 400"
        "401":
          description: "Acc&egrave;s refus&eacute;"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-401-000:
                  description: "E-401-000"
                  value:
                    code: "E-401-000"
                    message: "Accès refusé"
        "403":
          description: "Accès interdit"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-403-000:
                  description: "E-403-000"
                  value:
                    code: "E-403-000"
                    message: "Accès interdit, la fonctionnalité adhésion est désactivé\
                      e"
        "404":
          description: "Aucun numéro de compte ne correspond au numéro d'opération\
            \ saisi"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-404-000:
                  description: "E-404-000"
                  value:
                    code: "E-404-000,"
                    message: "Aucun numéro de compte ne correspond au numéro d'opé\
                      ration saisi"
        "500":
          description: "Erreur serveur interne"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              examples:
                E-500:
                  description: "E-500"
                  value:
                    code: "E-500"
                    message: "Erreur serveur interne"
      security:
        - bearerAuth: [ ]
components:
  schemas:
    CaaErrorMessage:
      type: "object"
      properties:
        code:
          type: "string"
          description: "Code de l'erreur"
          example: "E-40X-XXX | E-500"
        message:
          type: "string"
          description: "Message d'erreur fonctionnel ou technique"
          example: "<Erreur fonctionnelle> | Erreur serveur interne"
    CustomerDTOV1:
      title: "CustomerDTOV1"
      type: "object"
      description: "Données relatives au client"
      required:
        - "id"
        - "uom_code"
        - "agency_code"
      properties:
        id:
          type: "string"
          description: "Identifiant du client"
          example: 9000035679
          pattern: "^(?!\\s*$).+"
        uom_code:
          type: "string"
          description: "Code caisse regionale sur 5 chiffres"
          example: 20000
          pattern: "^(?!\\s*$).+"
    ActorDTOV1:
      title: "ActorDTOV1"
      type: "object"
      description: "Données de l'utilisateur à l'initiative de l'appel"
      required:
        - "id"
        - "uom_code"
        - "agency_code"
        - "type"
      properties:
        id:
          type: "string"
          description: "Matricule"
          example: "01"
          pattern: "^(?!\\s*$).+"
        uom_code:
          type: "string"
          description: "Code caisse regionale sur 5 chiffres"
          example: 20000
          pattern: "^(?!\\s*$).+"
        agency_code:
          type: "string"
          description: "Code agence de connexion sur 5 chiffres"
          example: "07612"
          pattern: "^(?!\\s*$).+"
        type:
          type: "string"
          enum:
            - "01"
            - "02"
            - "03"
            - "04"
            - "05"
          description: "Type. Valeurs possibles:\n  -  01 : conseiller/agent \n -\
            \ 02 : client/personne physique connue du système d'information \n - 03\
            \ : personne physique non connue du système d'information (intervenant\
            \ au travers d'un contrat d'entreprise) \n - 04 : prospect \n  -  05 :\
            \ traitement informatique non déclenché par un humain (automate)"
          example: "01"
    RecommendationAssessmentDTOV1:
      title: "RecommendationAssessmentDTOV1"
      type: "object"
      description: "Données relatives au Bilan Conseil (BC)"
      required:
        - "id"
        - "operation_number"
        - "distribution_situation_code"
        - "is_signed"
      properties:
        id:
          type: "string"
          description: "Identifiant du bilan conseil"
          example: 123456789
          pattern: "^(?!\\s*$).+"
        operation_number:
          type: "string"
          description: "Numéro de l'opération du bilan conseil"
          example: 10306
          pattern: "^(?!\\s*$).+"
        distribution_situation_code:
          type: "string"
          enum:
            - "01"
            - "02"
          description: "Contexte de la signature associé au choix du client. Valeurs\
            \ possibles:\n  - 01: Client présent\n - 02: Vente à distance"
          example: "01"
        is_signed:
          type: "boolean"
          description: "Le bilan conseil / ticket simm a été signé ou non"
    ContractDTOV1:
      title: "ContractDTOV1"
      type: "object"
      description: "Données relatives au contrat"
      required:
        - "id"
        - "uc_management_expense_rate"
        - "euro_management_expense_rate"
        - "free_deposit_ncr_fees_rate"
        - "has_marketable_management_expense"
        - "has_consulting_service"
        - "offer"
        - "initial_payment"
        - "investment_repartitions"
        - "beneficiary_clause"
      properties:
        id:
          type: "string"
          description: "Identifiant du contrat"
          example: 98751867433
          pattern: "^(?!\\s*$).+"
        accounting_decree_date:
          type: "string"
          format: "date-time"
          description: "Date arrêté comptable pour les clients ayant choisis d'être\
            \ en exercice décalé. (si PER)"
          example: "2023-03-08T10:39:24"
        retirement_regime_enrollment_date:
          type: "string"
          format: "date-time"
          description: "Date prévue de départ à la retraite (si PER)"
          example: "2023-03-08T10:39:24"
        insured_member_quality_code:
          type: "string"
          description: "Code qualité de l'adhérent (si PER) : \n - 1 : Chef d'exploitation\
            \ \n - 2 : Conjoint d'agriculteur \n - 3 : Aide familial \n - 4 : Agriculteur\
            \ retraité  \n - 5 : Commerçant \n - 6 : Artisan \n - 7 : Profession libé\
            rale ou indépendante   \n - 8 : Chef d'entreprise \n - 9 : Sans objet\
            \   \n - A : Auto-entrepreneur \n - B : Jeune installé \n - C : Retraité\
            \ professionnel   \n - D : Conjoint du professionnel \n - E : Enfant du\
            \ professionnel   \n - F : Autre professionnel \n - G : conjoint salarié\
            \ de l'exploitation  \n - H : Salarié de l’exploitation   \n - I : Travailleur\
            \ Non Salarié non agricole \n - J : Conjoint collaborateur  \n - K : Chef\
            \ d’exploitation ou d’entreprise agricole  \n - L : Enfant de l’agriculteur\
            \ \n - M : Autre agriculteur \n - N : Particulier \n - O : PRO-BIC/BNC\
            \ \n - P : PRO-AUTRES \n - Q : AGRI-CHEF D'EXPLOITATION OU D'ENTREPRISE\
            \ AGRICOLE \n - R : AGRI-AIDE FAMILIALE \n - S : AGRI-CONJOINT COLLABORATEUR\
            \ \n - T : MICRO ENTREPRENEUR \n - U : DIRIGEANTS ASSIMILES SALARIES \n\
            \ - V : DIRIGEANTS NON-SALARIES NON MADELIN"
          example: "C"
          pattern: "^(?!\\s*$).+"
        management_profil_code:
          type: "string"
          description: "Code du profil de risque du client"
          example: 2
          pattern: "^(?!\\s*$).+"
        management_profil_label:
          type: "string"
          description: "Libellé du profil de risque du client"
          example: "Prudent"
          pattern: "^(?!\\s*$).+"
        tax_framework_code:
          type: "string"
          description: "code du cadre fiscal :\n - 01 : Epargne handicap  \n - 02\
            \ : Rente survie  \n - 03 : Contrat de capitalisation nominatif \n - 04\
            \ : Contrat de capitalisation anonyme \n - 05 : Alsace / Moselle\n - 06\
            \ : Versements volontaires déductibles \n - 07 : Versements volontaires\
