openapi: 3.0.1
info:
  title: DECISEO-API
  description: >-
    Swagger for DECISEO API Internet/Intranet : Questionnaire pour déterminer un
    profil d'investissement
  version: v1.2.0
  contact:
    name: Ligrons-Tigres
servers:
  -   url: /deciseo/v1
tags:
  -   name: Profiling
  -   name: Survey
  -   name: Versements

paths:
  /profiling:
    post:
      tags:
        - Profiling
      summary: Creation et renvoi de la préconisation
      description: >-
        Permet d'enregistrer les réponses choisies par le client au questionnaire qui lui a été posé, et de définir son profil d'investissement en fonction de ses réponses. <br />
        Pour un acte d'adhésion uniquement on définit aussi  l'offre, le produit, l'éventuelle formule et le portefeuille d'investissement à préconiser <br />
        Pour un acte de versement libre LCL, il est également possible de renvoyer le portefeuille préconiser pour le client
        <br /><br />
        Temps de r&eacute;ponse maximum: 200 ms
      operationId: postInvestProfiling
      parameters:
        -   name: X-Passport
            in: header
            description: Le token utilisé pour propager l'identité de l'utilisateur
            required: true
            schema:
              type: string
              default: Bearer JWT Token
        -   name: Correlationid
            in: header
            description: L'ID de correlation de la requête
            required: false
            schema:
              type: string
              default: fc9022ac-6585-12e8-a547-b776567e0eca
        -   name: Authorization
            in: header
            description: Le token pour authentifier le service appelant
            required: true
            schema:
              type: string
              default: Bearer JWT Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvestSurveyAnswersInputDtoV1'
            examples:
              WithoutContractExample:
                summary: Exemple pour un acte d'adhésion
                value:
                  act_code: CADH
                  customer_id: '00005035455'
                  customer_uom_code: '80200'
                  initial_payment_amount: 1000
                  regular_payment_amount: 150
                  survey_questions_answers:
                    '1': 1
                    '2': 2
                    '3': 1
                    '4': 1
                    '5': 1
              WithContractExample:
                summary: Exemple pour un acte post-adhésion
                value:
                  act_code: VEEX
                  customer_id: '00005035455'
                  customer_uom_code: '80200'
                  contract_id: '98740978926'
                  product_code: UCIX 3
                  product_option_code: "OPT003"
                  survey_questions_answers:
                    '1': 1
                    '2': 2
                    '3': 1
                    '4': 1
                    '5': 1
      responses:
        '200':
          description: Response OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestProfilingOutput'
              examples:
                WithContractResponse:
                  summary: Exemple pour un acte post-adhésion
                  value:
                    id: "4875c710-1173-4843-a20f-bbddecb28c53"
                    act_code: "VEEX"
                    customer_id: "00005035455"
                    customer_uom_code: "80200"
                    product_code: "UCIX 3"
                    product_option_code: "OPT003"
                    delivery_channel: "IT"
                    profile_code: 3
                    profile_label: "Dynamique"
                    contract_id: "98740978926"
                    survey_questions:
                      -   number: 1
                          label: "L'objectif de votre projet?"
                          type: "OBJECTIF"
                          answer:
                            number: 1
                            label: "Transmettre un capital"
                    recommended_allocation:
                      is_active: false
                      financial_operations:
                        -   code: "VL"
                            invested_supports:
                              -   isin_code: "FR001400BL08"
                                  rate: 25.12
                                  is_euro: false

                    creation_date: "2025-03-08T10:39:24"


                WithoutContractResponse:
                  summary: Exemple pour un acte d'adhésion
                  value:
                    id: "4875c710-1173-4843-a20f-bbddecb28c53"
                    act_code: "CADH"
                    customer_id: "00005035455"
                    customer_uom_code: "80200"
                    agency_code: "07612"
                    product_code: "UCIX 3"
                    product_option_code: "OPT003"
                    delivery_channel: "IT"
                    profile_code: 3
                    profile_label: "Dynamique"
                    offer_code: 00574
                    initial_payment_amount: 1000
                    regular_payment_amount: 150
                    survey_questions:
                      -   number: 1
                          label: "L'objectif de votre projet?"
                          type: "OBJECTIF"
                          answer:
                            number: 1
                            label: "Transmettre un capital"
                    recommended_allocation:
                      is_active: true
                      financial_operations:
                        -   code: "VI"
                            invested_supports:
                              -   isin_code: "FR001400BL08"
                                  rate: 25.12
                                  is_euro: false
                        -   code: "VR"
                            invested_supports:
                              -   isin_code: "LU2443436352"
                                  rate: 13
                                  is_euro: false
                    creation_date: "2025-03-08T10:39:24"

        '400':
          description: >-
            Un ou plusieurs paramètres d'entrée sont incorrects ou une erreur
            fonctionnelle est survenue.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-400-000:
                  description: Erreur business g&eacute;n&eacute;rique.
                  value:
                    -   code: E-400-000
                        message: >-
                          Un ou plusieurs paramètres d'entrée sont incorrects ou
                          une erreur fonctionnelle est survenue.
                IFC2120:
                  description: >-
                    Erreur lors d'un appel à Zconnect, le message d'erreur peut
                    varier. Exemples : NUMERO DE QUESTION OBLIGATOIRE.
                  value:
                    -   code: E-400-002
                        message: IFC2120 FUNCTIONAL ERROR
                E-400-001:
                  description: >
                    Erreur business qui apparait lorsque les paramètres en
                    entrées sont incomplets.
                    
                    Cette erreur est générique. Lorsque l'on a un message plus
                    precis on affiche le message.
                  value:
                    -   code: E-400-001
                        message: Un ou plusieurs paramètres d'entrée sont incorrects
                    -   code: E-400-001
                        message: act_code must not be null
                E-400-004:
                  description: >-
                    Erreur quand valeur(s) manquante(s) dans le body de la
                    requête.
                  value:
                    -   code: E-400-004
                        message: Le paramètre customer id est obligatoire
        '401':
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-401-000:
                  description: Erreur quand accès refusé.
                  value:
                    code: E-401-000
                    message: Accès refusé
        '404':
          description: Aucune resource correspondante aux critères saisis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-404-000:
                  description: Erreur introuvable g&eacute;n&eacute;rique
                  value:
                    code: E-404-000
                    message: Aucune resource correspondante aux critères saisis
                E-404-001:
                  description: >-
                    Erreur business qui apparait lorsque les informations de la préconisation client sont introuvables.
                  value:
                    code: E-404-001
                    message: Données du profil d'investissement introuvables
        '500':
          description: Erreur serveur interne
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-500:
                  description: E-500
                  value:
                    code: E-500
                    message: Erreur serveur interne
      security:
        -   bearerAuth: [ ]

