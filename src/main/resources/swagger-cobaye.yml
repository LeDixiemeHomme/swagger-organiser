        -   name: Authorization
            in: header
            description: Le token pour authentifier le service appelant
            required: true
            schema:
              type: string
            example: Bearer JWT Token
      responses:
        '200':
          description: Response OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveyResponse'

        '400':
          description: >-
            Un ou plusieurs paramètres d'entrée sont incorrects ou une erreur
