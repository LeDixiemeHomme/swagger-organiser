components:
  schemas:
    AnswerDtoV1:
      type: object
      description: Réponse
      required:
        - number
      properties:
        number:
          type: integer
          description: Numéro de réponse
          format: int32
          example: 1
        label:
          type: string
          description: Libellé de la réponse
          example: Transmettre un capital

    InvestProfilingOutput:
      title: InvestProfilingOutput
      oneOf:
        -   $ref: '#/components/schemas/WithContractInvestProfilingResponse'
        -   $ref: '#/components/schemas/WithoutContractInvestProfilingResponse'

    BaseInvestProfilingOutput:
      type: object
      required:
        - id
        - act_code
        - customer_id
        - customer_uom_code
        - product_code
        - delivery_channel
        - profile_code
        - profile_label
        - survey_questions
      properties:
        id:
          type: string
          description: Identifiant de la préconisation
          example: 4875c710-1173-4843-a20f-bbddecb28c53
        act_code:
          type: string
          description: Code acte
          example: VEEX
        customer_id:
          type: string
          description: Numéro du client
          example: '00005035455'
        customer_uom_code:
          type: string
          description: Code caisse client
          example: '80200'
        product_code:
          type: string
          description: Code produit
          example: UCIX 3
        product_option_code:
          type: string
          description: option code produit
          example: OPT003
        delivery_channel:
          type: string
          description: Canal de distribution
          example: IT
        profile_code:
          type: integer
          description: Code du profil d'investissement
          format: int32
          example: 3
        profile_label:
          type: string
          description: Libelle du profil d'investissement
          example: Dynamique
        survey_questions:
          type: array
          description: Liste des questions posées au client avec la response associée choisie par le client
          items:
            $ref: '#/components/schemas/QuestionProfilingDtoV1'
        recommended_allocation:
          $ref: "#/components/schemas/RecommendedAllocation"

    WithoutContractInvestProfilingResponse:
      title: WithoutContractResponse
      required:
        - offer_code
        - initial_payment_amount
        - agency_code
        - recommended_allocation
      allOf:
        -   $ref: '#/components/schemas/BaseInvestProfilingOutput'
        -   type: object
            properties:
              offer_code:
                type: string
                description: Code de l'offre
                example: "00574"
              agency_code:
                type: string
                description: Code agence de connexion sur 5 chiffres
                example: "07612"
              initial_payment_amount:
                type: number
                format: decimal
                description: Montant du versement initial défini par le client. Uniquement pour une préconisation liée à un acte d'adhésion.
                example: 1000
              regular_payment_amount:
                type: number
                format: decimal
                description: Montant du versement regulier défini par le client. Uniquement pour une préconisation liée à un acte d'adhésion.
                example: 150
              creation_date:
                type: string
                description: Date de la préconisation
                format: date-time
                example: "2025-03-08T10:39:24"
              validity_end_date:
                type: string
                description: Date d'expiration de la préconisation
                format: date-time
                example: "2025-03-29T10:39:24"
    RecommendedAllocation:
      type: object
      description: Une répartition préconisée pour le client, obligatoire dans le cadre d'adhesion selfcare et facultatif pour les autres actes (VL,ARBI)
      required:
        - is_active
        - financial_operations
      properties:
        is_active:
          type: boolean
          description: |-
            Vaut vrai lorsque le portefeuille est en vigueur actuellement dans le référentiel.<br>
            Un portefeuille est préconisé en fonction de la formule, du profil client, et de l'intensité de risque qu'il a choisie.<br>
            Pour un même paramétrage de préconisation, il ne peut y avoir qu'un portefeuille en vigueur en même temps.<br>
          example: true
        financial_operations:
          type: array
          items:
            title: FinancialOperation
            type: object
            description: "Données relatives à une opération financière"
            required:
              - code
              - invested_supports
            properties:
              code:
                type: string
                enum: [ "VI","VR","VL" ]
                description: |
                  Code de l'opération financière. <br>
                  Valeurs possibles :
                  - VI : Versement initial
                  - VR : Versement régulier
                  - VL : Versement libre
                example: "VI"
              invested_supports:
                type: array
                description: "Liste des supports proposés pour les investissements du client"
                items:
                  type: object
                  description: "Support d'investissement : fonds euro ou unité de compte"
                  required:
                    - rate
                    - is_euro
                  properties:
                    isin_code:
                      type: string
                      description: "Code ISIN du support : identifiant unique et public"
                      example: "FR001400BL08"
                    rate:
                      type: number
                      description: "Taux d'investissement proposé sur le support en format décimal"
                      format: decimal
                      example: 25.12
                    is_euro:
                      type: boolean
                      description: "Booléen indiquant si c'est un support monétaire en Euro"
                      example: false

    WithContractInvestProfilingResponse:
      title: WithContractResponse
      type: object
      required:
        - contract_id
      allOf:
        -   $ref: '#/components/schemas/BaseInvestProfilingOutput'
        -   type: object
            properties:
              contract_id:
                type: string
                description: Numéro du contrat
                example: '98740978926'
              creation_date:
                type: string
                description: Date de création
                format: date-time
                example: "2025-03-08T10:39:24"

    WithContractInvestProfilingInput:
      title: WithContract
      required:
        - contract_id
        - product_code
      allOf:
        -   $ref: '#/components/schemas/BaseInvestSurveyAnswersInputDtoV1'
        -   type: object
            properties:
              contract_id:
                type: string
                description: Numéro du contrat. Obligatoire sauf pour un acte d'adhésion
                example: '98740978926'
              product_code:
                type: string
                description: Code produit. Obligatoire sauf pour un acte d'adhésion
                example: UCIX 3
              product_option_code:
                type: string
                description: option code produit
                example: OPT025
            example:
              WithContractExample:
                summary: Exemple pour un acte post-adhésion
                value:
                  act_code: VEEX
                  customer_id: '00005035455'
                  customer_uom_code: '80200'
                  contract_id: '98740978926'
                  product_code: UCIX 3
                  survey_questions_answers:
                    '1': 1
                    '2': 2
                    '3': 1
                    '4': 1
                    '5': 1

    WithoutContractInvestProfilingInput:
      title: WithoutContract
      required:
        - customer_id
        - customer_uom_code
        - initial_payment_amount
      allOf:
        -   $ref: '#/components/schemas/BaseInvestSurveyAnswersInputDtoV1'
        -   type: object
            properties:
              customer_id:
                type: string
                minLength: 1
                maxLength: 14
                description: Numéro du client
                example: '00005035455'
              customer_uom_code:
                type: string
                minLength: 5
                maxLength: 5
                description: Code caisse client
                example: '80200'
              initial_payment_amount:
                type: number
                format: decimal
                description: Montant du versement initial défini par le client. Obligatoire pour un acte d'adhésion uniquement
                example: 1000

              regular_payment_amount:
                type: number
                format: decimal
                description: Montant du versement regulier défini par le client. Uniquement pour une préconisation liée à un acte d'adhésion.
                example: 150
            example:
              WithoutContractExample:
                summary: Exemple pour un acte d'adhésion
                value:
                  act_code: CADH
                  customer_id: '00005035455'
                  customer_uom_code: '80200'
                  initial_payment_amount: 1000
                  survey_questions_answers:
                    '1': 1
                    '2': 2
                    '3': 1
                    '4': 1
                    '5': 1
    BaseInvestSurveyAnswersInputDtoV1:
      title: BaseInvestSurveyAnswersInputDtoV1
      required:
        - act_code
        - customer_id
        - customer_uom_code
        - survey_questions_answers
      type: object
      properties:
        act_code:
          type: string
          description: Code acte
          example: VEEX
        customer_id:
          type: string
          description: Numéro du client
          example: '00005035455'
        customer_uom_code:
          type: string
          description: Code caisse client
          example: '80200'
        survey_questions_answers:
          type: object
          additionalProperties:
            type: integer
            description: Liste des questions DECISEO avec la réponse choisie par le client
            format: int32
          description: Liste des questions DECISEO avec la réponse choisie par le client
          example:
            '1': 1
            '2': 2
            '3': 1
            '4': 1
            '5': 1
    QuestionProfilingDtoV1:
      type: object
      required:
        - number
      properties:
        number:
          type: integer
          description: Numéro de la question
          format: int32
          example: 1
        label:
          type: string
          description: Libellé de la question
          example: L'objectif de votre projet?
        type:
          type: string
          description: 'Type de la question <br> Valeurs possibles: <br> - OBJECTIF <br> - HORIZON <br> - PATRIMOINE <br> - AGE <br> - SENSIBILITE_RISQUE <br> - INTENSITE_RISQUE'
          example: OBJECTIF
        answer:
          $ref: '#/components/schemas/AnswerDtoV1'
      description: Question posée au client avec la response choisie associée
    CaaErrorMessage:
      type: object
      properties:
        code:
          type: string
          description: Code de l'erreur
          example: E-40X-XXX | E-500
        message:
          type: string
          description: Message d'erreur fonctionnel ou technique
          example: <Erreur fonctionnelle> | Erreur serveur interne
    InvestSurveyAnswersInputDtoV1:
      oneOf:
        -   $ref: '#/components/schemas/WithContractInvestProfilingInput'
        -   $ref: '#/components/schemas/WithoutContractInvestProfilingInput'
      discriminator:
        propertyName: act_code
        mapping:
          VEEX: '#/components/schemas/WithContractInvestProfilingInput'
          ARBI: '#/components/schemas/WithContractInvestProfilingInput'
          CADH: '#/components/schemas/WithoutContractInvestProfilingInput'

    SupportDtoV1:
      title: SupportDtoV1
      description: Un support doit avoir au moins un des deux champs remplis ":" soit proposed_investment_rate* pour un support investissable ou proposed_divestment_amount* pour un support désinvestissable. Si le support permet à la fois d’investir et de se désinvestir, les deux champs doivent être remplis
      required:
        - support_isin_code
      type: object
      properties:
        support_isin_code:
          type: string
          description: Le code isin du support
          example: FR0000991424

        support_percent_rate_decimal:
          type: number
          description: Taux d'investissement proposé sur le support en format décimal.deprecated pour harmonisation, utilisez proposed_investment_rate pour le taux d'investissement proposé
          format: decimal
          example: 18.15
          deprecated: true
        proposed_investment_rate:
          type: number
          description: Taux d'investissement proposé sur le support en format décimal. <br>Présent uniquement sur un support sur lequel un investissement est proposé.
          format: decimal
          example: 18.15
        proposed_divestment_amount:
          type: number
          description: Montant de désinvestissement proposé sur le support.<br>Présent uniquement pour un support déjà présent au contrat sur lequel un désinvestissement est proposé.
          format: decimal
          example: 3000.00
        surrender_value_amount:
          type: number
          description: Montant valeur de rachat du support, équivaut au montant désinvestissable sur le support avant proposition (à dissocier de l'encours sur le support, qui peut être égal au montant désinvestissable si aucune partie du capital n'est bloquée ou supérieure au montant désinvestissable si une partie du capital est bloquée). <br> présent uniquement pour un support déjà présent au contrat sur lequel un désinvestissement est proposé
          format: decimal
          example: 5000.00

