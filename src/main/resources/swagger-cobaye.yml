  /profilings:
    get:
      tags:
        - Profiling
      summary: Renvoie les données des préconisations rattachées à un client donné
      description: >-
        Renvoie les informations des préconisations client enregistrées lors du parcours avant-vente.<br />
        Un client peut avoir plusieurs préconisations lorsqu'il réalise plusieurs parcours d'adhésion, avec ou sans signature.<br>
        Pour une préconisation d'un acte d'adhésion uniquement sont aussi renvoyés l'offre, le produit, l'éventuelle formule et le portefeuille d'investissement à préconiser.<br /><br />
        Les filtres disponibles sont :<br>
        - Le booléen "last_only" qui permet de ne récupérer que la dernière préconisation que le client a créée.<br>
        - Le booléen "is_valid" qui permet de ne récupérer que les préconisations non expirées.<br><br>
        Temps de réponse maximum: 250 ms
      operationId: getInvestProfilings
      parameters:
        -   name: X-Passport
            in: header
            description: Le token utilisé pour propager l'identité de l'utilisateur
            required: true
            schema:
              type: string
            example: <JWT Token>
        -   name: Correlationid
            in: header
            description: L'ID de correlation de la requête
            required: false
            schema:
              type: string
            example: fc9022ac-6585-12e8-a547-b776567e0eca
        -   name: Authorization
            in: header
            description: Le token pour authentifier le service appelant
            required: true
            schema:
              type: string
            example: Bearer JWT Token
        -   name: "customer_id"
            in: query
            description: "L’identifiant du client chez le distributeur"
            required: true
            schema:
              type: string
              example: "00005035455"
        -   name: "uom_code"
            in: query
            description: "Code Caisse régionale"
            required: true
            schema:
              type: string
              example: "81000"
        -   name: act_code
            in: query
            description: |
              Code acte. <br>
              Valeurs possibles :
              - CADH = Adhésion
              - VEEX = Versement Libre
              - ARBI = Arbitrage
            schema:
              maxLength: 4
              minLength: 0
              type: string
              enum: [ "CADH","VEEX", "ARBI" ]
            example: "CADH"
        -   name: "last_only"
            in: query
            description: "Renseigné vrai lorsqu'on souhaite récupérer uniquement la préconisation qui a été créée en dernier"
            schema:
              type: boolean
              example: true
        -   name: "is_valid"
            in: query
            description: |-
              Renseigné vrai lorsqu'on souhaite récupérer uniquement les préconisations
              - dont la date d'expiration n'est pas passée
              - dont le portefeuille est encore en vigueur dans le référentiel
            schema:
              type: boolean
              example: true
      responses:
        '200':
          description: Response OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvestProfilingOutput'
        '400':
          description: "Un ou plusieurs paramètres d'entrée sont incorrects ou une erreur fonctionnelle est survenue."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-400-000:
                  description: Erreur business g&eacute;n&eacute;rique.
                  value:
                    -   code: E-400-000
                        message: >-
                          Un ou plusieurs paramètres d'entrée sont incorrects ou
                          une erreur fonctionnelle est survenue.
                E-400-005:
                  description: Erreur lorsqu'aucun uuid valide n'a été fournis.
                  value:
                    -   code: E-400-005
                        message: Le paramètre uuid est obligatoire
        '401':
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-401-000:
                  description: Erreur quand accès refusé.
                  value:
                    code: E-401-000
                    message: Accès refusé
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              example:
                code: "E-403-000"
                message: "Accès interdit"
        '500':
          description: Erreur serveur interne
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-500:
                  description: E-500
                  value:
                    code: E-500
                    message: Erreur serveur interne
      security:
        -   bearerAuth: [ ]

  /surveys:
    get:
      tags:
        - Survey
      summary: Renvoie le questionnaire à présenter au client en fonction du code acte et du distributeur.
      description: >-
        Renvoie le questionnaire à poser au client, composé de la liste des questions avec pour chacune la liste des réponses associées possibles. Ce questionnaire peut varier en fonction du distributeur (CA/LCL) et de l'acte.
          <br> Questionnaire paramétré dans DECISEO.
        <br /><br />
        Temps de r&eacute;ponse maximum: 100 ms
      operationId: getSurvey
      parameters:
        -   name: customer_uom_code
            in: query
            description: Code caisse client
            required: true
            schema:
              maxLength: 5
              minLength: 5
              type: string
            example: "80200"
        -   name: act_code
            in: query
            description: Code acte
            required: true
            schema:
              maxLength: 4
              minLength: 4
