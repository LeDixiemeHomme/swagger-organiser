  /products/minimum_payment_amounts:
    get:
      tags:
        - Versements
      summary: "Renvoie le plus petit montant de versement initial et versement régulier requis pour un acte d'adhésion."
      description: "Renvoie le plus petit montant de versement initial et de versement régulier requis pour continuer le parcours conseil d'adhésion selfcare.<br>Pour un acte d'adhésion LCL uniquement, deux montants possibles peuvent être proposés pour le versement initial, selon que l'utilisateur saisisse ou non un versement régulier.<br>Temps de réponse maximum : 100 ms"
      operationId: getMinimumPaymentAmounts
      parameters:
        -   name: customer_uom_code
            in: query
            description: Code caisse client
            required: true
            schema:
              maxLength: 5
              minLength: 0
              type: string
            example: "80200"
        -   name: commercial_relationship_code
            in: query
            description: 'Code type de relation commerciale. Obligatoire pour le LCL. <br> Les valeurs possibles sont  :<br> - 01 : Banque Assurance de Proximité (BAP)<br> - 02  : Banque Privé (BP)'
            required: false
            schema:
              type: string
              enum:
                - "01"
                - "02"
        -   name: Authorization
            in: header
            description: Le token pour authentifier le service appelant
            required: true
            schema:
              type: string
              example: Bearer JWT Token
        -   name: X-Passport
            in: header
            description: Le token utilisé pour propager l'identité de l'utilisateur
            required: true
            schema:
              type: string
            example: <JWT Token>
        -   name: Correlationid
            in: header
            description: >-
              L’identifiant de corrélation permet d’assurer la traçabilité des
              actions initiées par l’application consommatrice.
            required: false
            schema:
              type: string
              example: f77270a9-b280-43e2-96e1-66c290d702b1
      responses:
        '200':
          description: "le plus petit montant des versement initial et versement régulier "
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinimumPaymentAmountResponse"

        '400':
          description: >-
            Un ou plusieurs paramètres d'entrée sont incorrects ou une erreur
            fonctionnelle est survenue.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-400-000:
                  description: Erreur business g&eacute;n&eacute;rique.
                  value:
                    -   code: E-400-000
                        message: >-
                          Un ou plusieurs paramètres d'entrée sont incorrects ou
                          une erreur fonctionnelle est survenue.
                E-400-001:
                  description: customer_uom_code manquant
                  value:
                    -   code: E-400-001
                        message: >-
                          Le champ customer_uom_code est obligatoire.
                E-400-002:
                  description: Segment manquant pour LCL

                  value:
                    -   code: E-400-002
                        message: Le champ commercial_relationship_code est obligatoire pour un client LCL

                E-400-003:
                  description: Valeur de segment invalid
                  value:
                    -   code: E-400-003
                        message: La valeur du champ commercial_relationship_code est invalide. Les valeurs autorisées sont 01 ou 02.

                E-400-004:
                  description: >-
                    Erreur si un segment client est renseigné pour un client CA
                  value:
                    -   code: E-400-004
                        message: Le champ commercial_relationship_code n'est pas nécessaire pour un client CA.

        '401':
          description: "Accès refusé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              example:
                code: "E-401-000"
                message: "Accès refusé"
        "403":
          description: "Accès interdit"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaaErrorMessage"
              example:
                code: E-403-000
                message: "Accès interdit"
        '500':
          description: Erreur serveur interne
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaaErrorMessage'
              examples:
                E-500:
                  description: E-500
