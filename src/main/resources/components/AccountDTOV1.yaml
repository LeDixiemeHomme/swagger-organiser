---
title: "AccountDTOV1"
type: "object"
description: "Données relatives au compte pour les versements"
required:
- "iban"
- "bic_code"
- "owner"
properties:
  iban:
    type: "string"
    description: "Iban"
    pattern: "^(?!\\s*$).+"
    example: "FR0330002000110000123456T00"
  number:
    type: "string"
    description: "Numéro de compte"
    pattern: "^(?!\\s*$).+"
    example: "0000123456T"
  bic_code:
    type: "string"
    description: "code BIC"
    pattern: "^(?!\\s*$).+"
    example: "CRLYFRPPXXX"
  owner:
    type: "string"
    description: "RIB Nom du titulaire"
    pattern: "^(?!\\s*$).+"
    example: "M Jean Dupont"
  lender_id:
    type: "string"
    description: "Identifiant du créancier SEPA (ICS)"
    pattern: "^(?!\\s*$).+"
    example: "FR88ZZZ237434"
