- "code"
- "amount"
- "pockets"
properties:
  code:
    type: "string"
    description: "Code de l'investissement: \n - 01 Versement Initial F \n - 03 Versement\
      \ Régulier F \n - 04 Ecrêtage F \n - 12 Rachat partiel programmé sans gestion\
      \ du prorata F \n - 13 Rachat partiel programmé au prorata F \n"
    example: "01"
    pattern: "^(?!\\s*$).+"
  amount:
    type: "number"
    format: "double"
    description: "Montant brut de l'investissement (en €)"
    example: 5000
    pattern: "^(?!\\s*$).+"
  pockets:
    type: "array"
    items:
      $ref: "../components/PocketDTOV1.yaml"
