---
title: "FrcDTOV1"
type: "object"
description: "Données relatives à la fiche de renseignement complémentaire. A renseigner\
  \ si présence de FRC"
required:
- "type_code"
- "owner_occupation_label"
- "is_owner_payer"
- "is_customer_situation_coherent"
- "customer_relationship_duration_code"
- "funds_origins"
properties:
  type_code:
    type: "string"
    description: "Code type FRC :\n - 00 : MONTANT SUPERIEUR SEUIL \n - 01 : PERSONNE\
      \ MORALE \n - 02 : PAYS RESIDENCE SOUS SURVEILLANCE \n - 03 : PAYS FISCAL SOUS\
      \ SURVEILLANCE \n - 04 : PAYS BAO SOUS SURVEILLANCE \n - 05 : OPERATION SUR\
      \ CLIENT ANONYME \n - 06 : OPERATION PRECOSE \n - 07 : OPERATIONS FRACTIONNEES\
      \ RESEAU \n - 08 : PROPORTION VI/VP \n - 09 : CUMUL D'OPERATION \n - 10 : BANQUE\
      \ SOUS SURVEILLANCE \n - 11 : FICHE MANUELLE \n - 12 : FICHE MANUELLE \n - 13\
      \ : FICHE MULTI-CRITERES \n - 14 : PORTEUR NON CLIENT DE LA CAISSE D'OPERATION\
      \ \n - 15 : OPERATION NOMINATIVE BACK OFFICE \n - 16 : SEUIL ET FAMILLE DE PRODUIT\
      \ \n - 50 : SEUIL ET PAYS DE DOMICILE \n - 51 : SEUIL ET RESIDENCE FISCALE \n\
      \ - 52 : SEUIL ET RACHAT PRECOCE \n - 53 : SEUIL ET PROPORTION VI/VP \n - 54\
      \ : SEUIL ET CUMUL D'OPERATION \n - 55 : PAYS DOMICILE + RESID FISCALE \n -\
      \ 56 : PAYS DOMICILE + RACHAT - 2 ANS \n - 57 : PAYS DOMICILE + PROPORTIPON\
      \ VI/VP \n - 58 : PAYS DOMICILE + CUMUL OPERATION \n - 59 : RES FISCAL + RACHAT\
      \ - 2 ANS \n - 60 : RES FISCAL + PROPORTIPON VI/VP \n - 61 : RES FISCAL + CUMUL\
      \ OPERATION \n - 62 : NON CLIENT ET PAYS DE DOMICILE \n - 63 : NON CLIENT ET\
      \ RESIDENCE FISCALE \n - 64 : NON CLIENT ET RACHAT PRECOCE \n - 97 : FRC CREE\
      \ PAR L'ASSUREUR \n - 98 : CLIENT SOUS SURVEILLANCE SF"
    example: "00"
    pattern: "^(?!\\s*$).+"
  owner_occupation_label:
    type: "string"
    description: "Libellé de la profession du souscripteur"
    example: "texte libre"
    pattern: "^(?!\\s*$).+"
  is_owner_payer:
    type: "boolean"
    description: "Booléen indiquant si le souscripteur est également le payeur des\
      \ cotisations"
    pattern: "^(?!\\s*$).+"
  owner_payer_link_code:
    type: "string"
    description: "Code lien souscripteur/payeur (à renseigner si is_owner_payer =\
      \ false) :\n - CO :  Conjoint \n - AS : Ascendant 1er ou 2ème degré (parents\
      \ ou grand parents) \n - AU : Autre"
    example: "CO"
    pattern: "^(?!\\s*$).+"
  owner_payer_link_label:
    type: "string"
    description: "Libellé du lien souscripteur/payeur (à renseigner si is_owner_payer\
      \ = false et owner_payer_link_code = 'AU')"
    example: "texte libre"
  is_customer_situation_coherent:
    type: "boolean"
    description: "Booléen indiquant si l'opération est cohérente avec la connaissance\
      \ du client"
  customer_relationship_duration_code:
    type: "string"
    description: "Code durée de la relation client :\n - A : Moins d'un an \n - B\
      \ : 1 à 5 ans  \n - C : Plus de 5 ans \n - Z : Pas de compte bancaire au CA/LCL"
    example: "A"
  customer_relationship_observation:
    type: "string"
    description: "Observations sur la relation client"
    example: "texte libre"
  funds_origins:
    type: "array"
    items:
      $ref: "../components/FundsOriginDTOV1.yaml"
