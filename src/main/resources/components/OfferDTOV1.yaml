---
title: "OfferDTOV1"
type: "object"
description: "Donnée relatives à l'offre"
required:
- "code"
- "label"
- "product"
properties:
  code:
    type: "string"
    description: "identifiant de l'offre"
    example: "00527"
    pattern: "^(?!\\s*$).+"
  label:
    type: "string"
    description: "Libellé de l'offre"
    example: "LCL ACUITY EVOLUTION TRANSFERT"
    pattern: "^(?!\\s*$).+"
  custom_solution_code:
    type: "string"
    description: "Code solution personnalisée : \n - 01 : Faire un placement \n -\
      \ 02 : Préparer votre retraite \n - 03 : Préparer l'avenir des proches \n -\
      \ 04 : Percevoir un revenu régulier \n - 99 : A définir"
    example: "01"
  contract_id:
    type: "string"
    description: "Identifiant contrat de niveau offre. A renseigner dans le cas d'une\
      \ adhésion dans une offre existante (offre multi-produit, multi détention)"
    example: "O9999999540"
  product:
    $ref: "../components/ProductDTOV1.yaml"
