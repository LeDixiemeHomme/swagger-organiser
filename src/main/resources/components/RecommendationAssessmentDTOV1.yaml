---
title: "RecommendationAssessmentDTOV1"
type: "object"
description: "Données relatives au Bilan Conseil (BC)"
required:
- "id"
- "operation_number"
- "distribution_situation_code"
- "is_signed"
properties:
  id:
    type: "string"
    description: "Identifiant du bilan conseil"
    example: 123456789
    pattern: "^(?!\\s*$).+"
  operation_number:
    type: "string"
    description: "Numéro de l'opération du bilan conseil"
    example: 10306
    pattern: "^(?!\\s*$).+"
  distribution_situation_code:
    type: "string"
    enum:
    - "01"
    - "02"
    description: "Contexte de la signature associé au choix du client. Valeurs possibles:\n\
      \  - 01: Client présent\n - 02: Vente à distance"
    example: "01"
  is_signed:
    type: "boolean"
    description: "Le bilan conseil / ticket simm a été signé ou non"
