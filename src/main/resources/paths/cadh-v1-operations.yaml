---
post:
  tags:
  - "Acte d'adhésion"
  summary: "Service d'enregistrement d'une proposition d'adhésion épargne"
  description: "Service d'enregistrement d'une proposition d'adh&eacute;sion &eacute;pargne.\
    \ <br> Temps de r&eacute;ponse maximal 1,500s."
  operationId: "createOperationUsingPOST"
  parameters:
  - name: "Authorization"
    in: "header"
    description: "Le token pour authentifier le service appelant"
    required: true
    schema:
      type: "string"
      example: "Bearer JWT Token"
  - name: "X-Passport"
    in: "header"
    description: "Le token utilisé pour propager l'identité de l'utilisateur"
    required: true
    schema:
      type: "string"
    example: "<JWT Token>"
  - name: "Correlationid"
    in: "header"
    description: "L’identifiant de corrélation permet d’assurer la traçabilité des\
      \ actions initiées par l’application consommatrice."
    required: true
    schema:
      type: "string"
      example: "f77270a9-b280-43e2-96e1-66c290d702b1"
  requestBody:
    description: "Les informations nécessaire à l'enregistrement d'une opération d'adhé\
      sion"
    content:
      application/json:
        schema:
          $ref: "../components/OperationInputDTOV1.yaml"
    required: true
  responses:
    "201":
      description: "La proposition d'adhésion a bien été enregistrée"
      headers:
        Location:
          schema:
            type: "string"
            example: "https://dev-f6-api.predica-hprd.caas.caa.group.gca/cadh/v1/operations/4d7d6c3a-5c7b-4d67-9fba-93c6db215018"
          description: "L'uri GET pour la ressource crée"
      content:
        application/json:
          schema:
            $ref: "../components/OperationOutputDTOV1.yaml"
    "400":
      description: "Un ou plusieurs param&egrave;tres d'entr&eacute;e sont incorrects\
        \ ou une erreur fonctionnelle est survenue"
      content:
        application/json:
          schema:
            type: "array"
            items:
              $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-400-000:
              description: "E-400-000"
              value:
              - code: "E-400-000"
                message: "Un ou plusieurs paramètres d'entrée sont incorrects ou une\
                  \ erreur fonctionnelle est survenue"
            E-400-001:
              description: "E-400-001"
              value:
              - code: "E-400-001"
                message: "Autre message 400"
    "401":
      description: "Acc&egrave;s refus&eacute;"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-401-000:
              description: "E-401-000"
              value:
                code: "E-401-000"
                message: "Accès refusé"
    "403":
      description: "Accès interdit"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-403-000:
              description: "E-403-000"
              value:
                code: "E-403-000"
                message: "Accès interdit, la fonctionnalité adhésion est désactivé\
                  e"
    "500":
      description: "Erreur serveur interne"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-500:
              description: "E-500"
              value:
                code: "E-500"
                message: "Erreur serveur interne"
  security:
  - bearerAuth: []
