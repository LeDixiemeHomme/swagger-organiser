---
put:
  tags:
  - "Acte d'adhésion"
  summary: "Effectue la mise en vigueur de la proposition."
  description: "Effectue la mise en vigueur de la proposition rattach&eacute;e &agrave;\
    \ l'id op&eacute;ration <br> Temps de r&eacute;ponse maximal 1,500s."
  operationId: "putEnforcement"
  parameters:
  - name: "Authorization"
    in: "header"
    description: "Le token pour authentifier le service appelant"
    required: true
    schema:
      type: "string"
      default: "Bearer JWT Token"
  - name: "X-Passport"
    in: "header"
    description: "Le token utilisé pour propager l'identité de l'utilisateur"
    required: true
    schema:
      type: "string"
      default: "<JWT Token>"
  - name: "Correlationid"
    in: "header"
    description: "L’identifiant de corrélation permet d’assurer la traçabilité des\
      \ actions initiées par l’application consommatrice."
    required: true
    schema:
      type: "string"
      default: "f77270a9-b280-43e2-96e1-66c290d702b1"
  - name: "operation_id"
    in: "path"
    description: "L’uuid de l'opération d'adhésion épargne"
    required: true
    schema:
      type: "string"
      default: "f6c290d70-b280-43e2-96e1-66c290d02b1"
  - name: "technical_communication_code"
    in: "query"
    description: "Norme groupe CAM0258: Moyen et format d'échange utilisé pour communiquer\
      \ avec le client. <br> Cette donnée étant fortement liée au \"signature_type\"\
      \ il est nécessaire de remplir les deux si vous voulez la remplir. <br> Si ces\
      \ données ne sont pas remplis, les valeurs par défaut sont technical_communication_code:\
      \ 170 et signature_type: 4 <br> Valeurs supportées: <br> &nbsp; 010: Face à\
      \ face agence (transmission d'informations directement entre personnes physiquement\
      \ présentes sur le même lieu (agence)) <br> &nbsp; 170: Internet ordinateur\
      \ individuel (par opposition à l’Internet mobile, l’utilisateur accède au ré\
      seau depuis un navigateur web installé sur un ordinateur individuel non apparenté\
      \ à un téléphone mobile) <br> &nbsp; 180: Internet mobile (accès au réseau depuis\
      \ un navigateur web (protocole Internet) installé sur le téléphone mobile de\
      \ l’utilisateur)"
    required: false
    schema:
      type: "string"
    example: 170
  - name: "signature_type"
    in: "query"
    description: "Norme groupe CAM0309: Types de signature disponibles. <br> Cette\
      \ donnée étant fortement liée au \"technical_communication_code\" il est né\
      cessaire de remplir les deux si vous voulez la remplir. <br> Valeurs supporté\
      es: <br> &nbsp; 1: Signature manuscrite <br> &nbsp; 4: Signature électronique"
    required: false
    schema:
      type: "string"
    example: 4
  responses:
    "200":
      description: "OK"
      content:
        application/json:
          schema:
            $ref: "../components/EnforcementOutputDTOV1.yaml"
          example:
            archive_id: "202200690781566"
            function_policy_number: 0
    "400":
      description: "Un ou plusieurs param&egrave;tres d'entr&eacute;e sont incorrects\
        \ ou une erreur fonctionnelle est survenue"
      content:
        application/json:
          schema:
            type: "array"
            items:
              $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-400-000:
              description: "E-400-000"
              value:
              - code: "E-400-000"
                message: "Un ou plusieurs paramètres d'entrée sont incorrects ou une\
                  \ erreur fonctionnelle est survenue"
            E-400-001:
              description: "E-400-001"
              value:
              - code: "E-400-001"
                message: "Autre message 400"
    "401":
      description: "Acc&egrave;s refus&eacute;"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-401-000:
              description: "E-401-000"
              value:
                code: "E-401-000"
                message: "Accès refusé"
    "403":
      description: "Accès interdit"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-403-000:
              description: "E-403-000"
              value:
                code: "E-403-000"
                message: "Accès interdit, la fonctionnalité adhésion est désactivé\
                  e"
    "404":
      description: "Aucun numéro de compte ne correspond au numéro d'opération saisi"
      content:
        application/json:
          schema:
            type: "array"
            items:
              $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-404-000:
              description: "E-404-000"
              value:
                code: "E-404-000,"
                message: "Aucun numéro de compte ne correspond au numéro d'opération\
                  \ saisi"
    "500":
      description: "Erreur serveur interne"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-500:
              description: "E-500"
              value:
                code: "E-500"
                message: "Erreur serveur interne"
  security:
  - bearerAuth: []
