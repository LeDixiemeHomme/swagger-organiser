---
get:
  tags:
  - "Acte d'adhésion"
  summary: "Retourne la liste des documents à signer"
  description: "Retourner la liste des documents (contractuels &agrave; signer et\
    \ pr&eacute;contractuels à pr&eacute;senter) <br> associ&eacute;e &agrave; une\
    \ adh&eacute;sion. <br> Temps de r&eacute;ponse maximal 0,400s."
  operationId: "getDocuments"
  parameters:
  - name: "operation_id"
    in: "path"
    description: "UUID de l'opération"
    required: true
    schema:
      type: "string"
    example: "6b6dce06-b3a5-4fc5-a58d-c21a207cd75e"
  - name: "signature_date"
    in: "query"
    description: "Date de signature"
    required: false
    schema:
      type: "string"
    example: "2023-04-14T07:58:30.996+0200"
  - name: "generate"
    in: "query"
    description: "Flag de génération des documents"
    required: false
    schema:
      type: "boolean"
      default: false
    example: false
  - name: "Authorization"
    in: "header"
    description: "Le token pour authentifier le service appelant"
    required: true
    schema:
      type: "string"
      example: "Bearer JWT Token"
  - name: "X-Passport"
    in: "header"
    description: "Le token utilisé pour propager l'identité de l'utilisateur"
    required: true
    schema:
      type: "string"
    example: "<JWT Token>"
  - name: "Correlationid"
    in: "header"
    description: "L’identifiant de corrélation permet d’assurer la traçabilité des\
      \ actions initiées par l’application consommatrice."
    required: true
    schema:
      type: "string"
      example: "f77270a9-b280-43e2-96e1-66c290d702b1"
  responses:
    "200":
      description: "Les documents à signer et présenter"
      content:
        application/json:
          schema:
            type: "array"
            items:
              $ref: "../components/DocumentDTOV1.yaml"
    "400":
      description: "Un ou plusieurs param&egrave;tres d'entr&eacute;e sont incorrects\
        \ ou une erreur fonctionnelle est survenue"
      content:
        application/json:
          schema:
            type: "array"
            items:
              $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-400-000:
              description: "E-400-000"
              value:
              - code: "E-400-000"
                message: "Un ou plusieurs paramètres d'entrée sont incorrects ou une\
                  \ erreur fonctionnelle est survenue"
            E-400-007:
              description: "E-400-002"
              value:
              - code: "E-400-002"
                message: "Autre message 400"
    "401":
      description: "Acc&egrave;s refus&eacute;"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-401-000:
              description: "E-401-000"
              value:
                code: "E-401-000"
                message: "Accès refusé"
    "403":
      description: "Accès interdit"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-403-000:
              description: "E-403-000"
              value:
                code: "E-403-000"
                message: "Accès interdit, la fonctionnalité adhésion est désactivé\
                  e"
    "500":
      description: "Erreur serveur interne"
      content:
        application/json:
          schema:
            $ref: "../components/CaaErrorMessage.yaml"
          examples:
            E-500:
              description: "E-500"
              value:
                code: "E-500"
                message: "Erreur serveur interne"
  security:
  - bearerAuth: []
